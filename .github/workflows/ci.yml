name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      full_containers:
        description: Build and boot both production containers
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-docker.txt
            requirements-dev.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg

      - name: Install backend and QA dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.2"
          python -m pip install -r requirements-docker.txt -r requirements-dev.txt
          python -m pip check

      - name: Validate repository and generated catalog
        run: |
          python scripts/check_duplicate_filenames.py
          python scripts/validate_model_catalog.py
          python -m compileall -q src tests scripts main.py

      - name: Check critical Python static errors
        run: |
          python -m flake8 src tests scripts --select E9,F63,F7,F82 --exclude .venv,frontend/node_modules
          python -m mypy --follow-imports=skip \
            src/utils/newapi_models.py \
            src/utils/media_refs.py \
            src/utils/provider_registry.py \
            src/utils/model_catalog.py \
            src/utils/uploads.py \
            src/utils/deployment_security.py \
            src/apps/comic_gen/export.py

      - name: Check formatting of new safety surfaces
        run: |
          python -m black --check \
            main.py \
            src/apps/playground/api.py \
            src/apps/playground/service.py \
            src/apps/playground/storage.py \
            src/utils/__init__.py \
            src/utils/deployment_security.py \
            src/utils/uploads.py \
            src/apps/comic_gen/export.py \
            scripts/check_duplicate_filenames.py \
            tests/test_art_direction_analysis.py \
            tests/test_bulk_video_generation.py \
            tests/test_deployment_security.py \
            tests/test_dev_setup_contract.py \
            tests/test_docker_frontend_routing.py \
            tests/test_export_media.py \
            tests/test_generation_contracts.py \
            tests/test_persistence_contracts.py \
            tests/test_polish_error.py \
            tests/test_repo_hygiene.py \
            tests/test_runtime_scripts.py \
            tests/test_upload_limits.py
          python -m isort --check-only \
            main.py \
            src/apps/playground/api.py \
            src/apps/playground/service.py \
            src/apps/playground/storage.py \
            src/utils/__init__.py \
            src/utils/deployment_security.py \
            src/utils/uploads.py \
            src/apps/comic_gen/export.py \
            scripts/check_duplicate_filenames.py \
            tests/test_art_direction_analysis.py \
            tests/test_bulk_video_generation.py \
            tests/test_deployment_security.py \
            tests/test_dev_setup_contract.py \
            tests/test_docker_frontend_routing.py \
            tests/test_export_media.py \
            tests/test_generation_contracts.py \
            tests/test_persistence_contracts.py \
            tests/test_polish_error.py \
            tests/test_repo_hygiene.py \
            tests/test_runtime_scripts.py \
            tests/test_upload_limits.py

      - name: Run backend regression with coverage floor
        env:
          LUMENX_DATA_DIR: ${{ runner.temp }}/lumenx-data
          LUMENX_LOG_DIR: ${{ runner.temp }}/lumenx-data/logs
          LUMENX_PRELOAD_DEMUCS: "0"
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python -m pytest -p no:cacheprovider -q
          --cov=src --cov-report=term --cov-report=xml
          --cov-fail-under=40

      - name: Audit installed Python dependencies
        run: python -m pip_audit --local --progress-spinner off

  frontend:
    name: Frontend and launch tooling
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Verify root launcher dependencies
        run: |
          npm ci --ignore-scripts
          npm ls --depth=0
          npm audit --audit-level=low
          node --check scripts/dev-setup.js
          node --check scripts/start-backend.js

      - name: Install locked frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm ls --depth=0
          npm audit --audit-level=low

      - name: Run frontend quality gates
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
          npm run test:all
          npm run check:colors

      - name: Verify Docker and desktop static exports
        working-directory: frontend
        run: |
          DOCKER_BUILD=true npm run build
          npm run check:export
          ! grep -q '/static/_next/' out/index.html
          npm run build
          npm run check:export
          grep -q '/static/_next/' out/index.html
          test -f out/index.html

  packaging-syntax:
    name: Packaging syntax (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell and Python packaging files
        if: runner.os == 'Linux'
        run: |
          bash -n build_mac.sh
          sh -n start_backend.sh
          sh -n start_frontend.sh
          python3 -m py_compile main.py build.spec.template

      - name: Validate PowerShell packaging file
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "build_windows.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

  container-config:
    name: Container configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose expansion
        run: |
          cp .env.example .env
          docker compose config --quiet

  full-containers:
    name: Build and boot production containers
    if: github.event_name == 'schedule' || inputs.full_containers == true
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - name: Build and smoke-test Compose stack
        run: |
          cp .env.example .env
          trap 'docker compose down --volumes' EXIT
          docker compose up --detach --build
          ready=false
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:17177/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000/ >/dev/null; then
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != true ]; then
            docker compose logs
            exit 1
          fi
          curl --fail --silent http://127.0.0.1:3000/docs >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:3000/files/projects.json)" = 404
          docker compose exec -T backend python - <<'PY'
          import os
          from src.apps.comic_gen.api import get_user_config_path
          assert get_user_config_path() == "/data/config.json"
          assert os.environ["LUMENX_LOG_DIR"] == "/data/logs"
          PY
