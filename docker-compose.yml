services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lumenx-backend
    env_file:
      - .env
    environment:
      - NO_PROXY=.aliyuncs.com,aliyuncs.com,localhost,127.0.0.1
      - LUMENX_CONTAINER_LOCAL_DIAGNOSTICS=true
      - LUMENX_DOCKER_BIND_HOST=${LUMENX_DOCKER_BIND_HOST:-127.0.0.1}
    volumes:
      - ./output:/app/output
      - lumenx-config:/data
    ports:
      - "${LUMENX_DOCKER_BIND_HOST:-127.0.0.1}:17177:17177"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lumenx-frontend
    ports:
      - "${LUMENX_DOCKER_BIND_HOST:-127.0.0.1}:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lumenx-config:
