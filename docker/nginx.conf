server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Frontend routes (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # The production frontend uses same-origin API URLs. Keep every top-level
    # prefix referenced by frontend/src/lib/api.ts in this regex so API calls
    # are proxied instead of falling through to the SPA's index.html.
    location ~ ^/(projects|series|library|playground|tasks|art_direction|video|config|health|system|diagnose|debug|redoc|prompt_defaults|bgm|upload|voices)(?:/|$) {
        proxy_pass http://backend:17177;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location ^~ /files/ {
        proxy_pass http://backend:17177;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:17177;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:17177;
        proxy_set_header Host $host;
    }
}
