family: gpt-image
display_name: "GPT Image"
provider: newapi
routing_prefixes:
  - gpt-image-
supported_backends:
  - newapi
default_backend: newapi
credential_sources:
  newapi:
    - NEWAPI_GPT_IMAGE_2_API_KEY
supported_modalities:
  - t2i
  - i2i
docs:
  official_snapshot_ids:
    - newapi/gpt-image-2/2026-07-18
transport:
  image_input_mode:
    newapi: openai_multipart_image
  audio_input_mode:
    newapi: unsupported
  reference_video_input_mode:
    newapi: unsupported
models:
  - id: gpt-image-2
    display_name: GPT Image 2
    description: GPT Image 2 through New API for text-to-image generation and image editing
    status: active
    release_stage: stable
    capabilities: [t2i, i2i]
    credential_sources:
      newapi: [NEWAPI_GPT_IMAGE_2_API_KEY]
    docs:
      context_hub_doc_ids: [newapi/gpt-image-2]
    runtime:
      newapi:
        gateway: newapi
    ui:
      selection_group: image
      visible_in: [project_settings, series_settings, global_settings]
      order: 100
      recommended: true
    params:
      size:
        options: ["1024x1024", "1536x1024", "1024x1536"]
        default: "1024x1024"
      quality:
        options: ["high", "medium", "low"]
        default: "high"
      negativePrompt: false
      seed: false
      promptExtend: false
      watermark: false
